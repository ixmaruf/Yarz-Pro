name = "yarz-admin"
main = "worker-supabase.js"
compatibility_date = "2024-01-01"

# R2 Bucket binding for backups
[[r2_buckets]]
binding = "YARZ_BACKUPS"
bucket_name = "yarz-backups"

# CRON trigger: daily at midnight UTC
[triggers]
crons = ["0 0 * * *"]

# Environment variables (non-secret)
[vars]
SUPABASE_ENABLED = "true"
