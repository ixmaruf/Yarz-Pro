<script>
  // GitHub Pages SPA redirect: if user landed here via deep link with a hash route,
  // redirect to root index with the hash preserved.
  // ✅ v15.45 SEO: Delay redirect 5 seconds so users can read the message
  // and Googlebot can crawl the noindex tag. Auto-redirect was destroying
  // 404 attribution previously.
  (function () {
    var hash = window.location.hash || '';
    var path = window.location.pathname || '';
    var segments = path.split('/').filter(Boolean);
    var redirect = '/' + (hash || '');
    if (segments.length > 0) {
      // Try to redirect to the closest index.html
      redirect = '/' + segments[0] + '/' + (hash || '');
      // If we're on a custom domain (no subfolder), just go to root
      if (window.location.hostname.indexOf('github.io') === -1) {
        redirect = '/' + (hash || '');
      }
    }
    setTimeout(function () { window.location.replace(redirect); }, 5000);
  })();
</script>
